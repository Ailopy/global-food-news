# =============================================================
# 全球食品资讯聚合 - 资讯源配置
# 来源：用户 Excel《新素材矩阵》，共 46 个网站
# 优先级说明：★★★ A+（每日必抓，核心来源）/ ★★ A（每周抓取）/ ★ B（补充来源）
# 抓取顺序：每次运行按 A+ > A > B 排序，确保核心来源优先完成
# RSS状态：✅ 已验证可用 | ⚠️ 暂无RSS（待扩展） | 🔒 被封锁（需代理或其他方式）
# =============================================================

settings:
  keep_days: 7          # 保留最近N天资讯
  max_per_source: 50    # 每个来源最多保留条数
  fetch_timeout: 15     # 抓取超时秒数
  output_dir: web/data  # JSON 输出目录
  retry_times: 3        # 失败重试次数
  # A+ 优先：抓取时 A+ 级别来源排在队列最前面，确保优先完成
  # A+ 来源当前包括：Food Dive（已启用）、PR Times / Food Business News / Food Navigator 系列（待解锁）

